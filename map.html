<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargoOps - Live Flight Route Visualizer</title>
    <!-- Include Leaflet CSS for map styling -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Courier New", Courier, monospace;
            background-color: #f4f6f9;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .map-overlay-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            max-width: 320px;
            border: 1px solid #000;
        }
        .map-overlay-panel h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }
        .route-item {
            font-size: 12px;
            margin-bottom: 8px;
            padding: 6px;
            background: #fff;
            border: 1px solid #ccc;
        }
        .back-link {
            display: inline-block;
            margin-top: 10px;
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Control Overlay Panel for Manifest Status -->
    <div class="map-overlay-panel">
        <h2>Live Route Manifest</h2>
        <div id="routeList">Tracking inactive. No active manifests loaded.</div>
        <a href="index.html" class="back-link">&larr; Return to Dashboard</a>
    </div>

    <!-- Map Canvas Element -->
    <div id="map"></div>

    <!-- Include Leaflet JS Library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // 1. Core IATA Airport Coordinates Lookup Database
        const airportRegistry = {
            'JFK': [40.6398, -73.7789],
            'LHR': [51.4700, -0.4543],
            'DXB': [25.2532, 55.3657],
            'SIN': [1.3644, 103.9915],
            'HKG': [22.3080, 113.9185],
            'FRA': [50.0379, 8.5622]
        };

        // 2. Initialize the global map view focused over the Atlantic corridor
        const map = L.map('map').setView([30.0, -10.0], 3);

        // 3. Apply standard, crisp high-contrast map textures (CartoDB Positron)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // 4. Load saved operational records out of LocalStorage
        const savedShipments = JSON.parse(localStorage.getItem('airCargoShipments')) || [];
        const routeListEl = document.getElementById('routeList');

        if (savedShipments.length > 0) {
            routeListEl.innerHTML = ''; // Clear inactive text
            
            savedShipments.forEach((shipment, index) => {
                const originCoord = airportRegistry[shipment.origin.toUpperCase()];
                const destCoord = airportRegistry[shipment.destination.toUpperCase()];

                // Output text telemetry into control panel
                const item = document.createElement('div');
                item.className = 'route-item';
                item.innerHTML = `<strong>AWB:</strong> ${shipment.awbNumber}<br><strong>Flight Path:</strong> ${shipment.origin} &rarr; ${shipment.destination}`;
                routeListEl.appendChild(item);

                // If coordinates are configured in the registry, plot them visually
                if (originCoord && destCoord) {
                    // Mark Origin Airport
                    L.marker(originCoord).addTo(map)
                        .bindPopup(`<b>Origin: ${shipment.origin}</b><br>AWB: ${shipment.awbNumber}`);

                    // Mark Destination Airport
                    L.marker(destCoord).addTo(map)
                        .bindPopup(`<b>Destination: ${shipment.destination}</b>`);

                    // Draw operational path line joining points
                    const pathLine = L.polyline([originCoord, destCoord], {
                        color: '#ff4d4d',
                        weight: 3,
                        opacity: 0.8,
                        dashArray: '5, 10' // Dashed line simulating flight vectors
                    }).addTo(map);

                    // Automatically adjust map viewport bounding frame around the primary flight path
                    if (index === 0) {
                        map.fitBounds(pathLine.getBounds(), { padding: [50, 50] });
                    }
                }
            });
        }
    </script>
</body>
</html>
